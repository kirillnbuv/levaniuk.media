<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEVANIUK.MEDIA - Photographer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <!-- Шапка сайту -->
        <header>
            <div class="logo">
                <h1>LEVANIUK.MEDIA</h1>
                <p>PHOTOGRAPHER KYRYL LEVANIUK</p>
            </div>
            <nav>
                <a href="#">OVERVIEW</a>
                <a href="#about">CONTACT / ABOUT</a>
                <a href="#">SEARCH</a>
            </nav>
        </header>

        <!-- Галерея -->
        <main>
            <div class="gallery" id="gallery">
                <!-- Фотографії будуть додані через JavaScript -->
            </div>
        </main>

        <!-- Секція About -->
        <section id="about" class="about-section">
            <h2 class="section-title">ABOUT ME</h2>
            <!-- Тут можна додати ваш текст -->
        </section>

        <!-- Секція Контактів -->
        <section id="contact" class="contact-section">
            <h2 class="section-title">CONTACT FORM</h2>
            
            <form action="#" method="POST" class="contact-form">
                <input type="text" placeholder="Name" required>
                <input type="email" placeholder="Email" required>
                <input type="text" placeholder="Subject">
                <textarea placeholder="Message" rows="5" required></textarea>
                
                <div class="form-bottom">
                    <!-- Імітація reCAPTCHA для дизайну -->
                    <div class="recaptcha-box">
                        <label>
                            <input type="checkbox" required> Я не робот
                        </label>
                        <div class="recaptcha-logo">
                            <span class="icon">↻</span>
                            <span class="text">reCAPTCHA</span>
                        </div>
                    </div>
                    <button type="submit" class="submit-btn">Надіслати</button>
                </div>
            </form>
        </section>
    </div>

    <!-- Модальне вікно (Лайтбокс) для перегляду фото -->
    <div id="lightbox" class="lightbox">
        <span class="close-btn">&times;</span>
        <button class="nav-btn prev-btn">&#10094;</button>
        <img class="lightbox-content" id="lightbox-img" src="" alt="Full image">
        <button class="nav-btn next-btn">&#10095;</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
